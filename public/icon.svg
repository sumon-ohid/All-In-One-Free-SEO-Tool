<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#5e6ad2"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <!-- rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="104" ry="104" fill="url(#bg)"/>
  <!-- subtle top-light specular -->
  <rect x="0" y="0" width="512" height="512" rx="104" ry="104" fill="url(#shine)"/>
  <!-- inner glow blob for depth -->
  <circle cx="120" cy="100" r="120" fill="#a78bfa" opacity="0.35" filter="url(#soft)"/>
  <!-- monogram S -->
  <text
    x="256"
    y="356"
    text-anchor="middle"
    font-family="Inter, -apple-system, 'Segoe UI', system-ui, sans-serif"
    font-size="320"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-12"
  >S</text>
  <!-- sparkle accent (top-right) -->
  <g transform="translate(376 120)" fill="#fbbf24">
    <path d="M0 -28 L7 -7 L28 0 L7 7 L0 28 L-7 7 L-28 0 L-7 -7 Z"/>
  </g>
</svg>
